services:
  - type: web
    name: slop-cannons
    runtime: static
    buildCommand: npm install && NODE_ENV=production npm run build
    staticPublishPath: out
    envVars:
      - key: NODE_VERSION
        value: "20"
    domains:
      - slopcannons.com
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=86400, s-maxage=604800
      - path: /opengraph-image
        name: Content-Type
        value: image/png
      - path: /*/opengraph-image
        name: Content-Type
        value: image/png
